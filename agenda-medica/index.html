<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediApp - Agenda Médica Electrónica</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <h1>MediApp</h1>
                <p class="subtitle">Agenda Electrónica de Citas Médicas</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="tu@correo.com" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="userType">Tipo de Usuario</label>
                    <select id="userType" name="userType" required>
                        <option value="">Selecciona tu tipo de usuario</option>
                        <option value="patient">Paciente</option>
                        <option value="secretary">Secretaria</option>
                        <option value="doctor">Médico</option>
                    </select>
                </div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>

            <div class="divider">o</div>

            <button id="signupBtn" class="btn-signup">¿No tienes cuenta? Registrarse</button>

            <div id="errorMessage" class="error-message" style="display: none;"></div>
        </div>

        <!-- Modal de Registro -->
        <div id="signupModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Crear Nueva Cuenta</h2>

                <form id="signupForm" class="signup-form">
                    <div class="form-group">
                        <label for="firstName">Nombre</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>

                    <div class="form-group">
                        <label for="lastName">Apellido</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>

                    <div class="form-group">
                        <label for="signupEmail">Correo Electrónico</label>
                        <input type="email" id="signupEmail" name="signupEmail" required>
                    </div>

                    <div class="form-group">
                        <label for="signupPassword">Contraseña</label>
                        <input type="password" id="signupPassword" name="signupPassword" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Teléfono</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>

                    <div class="form-group">
                        <label for="signupUserType">Tipo de Usuario</label>
                        <select id="signupUserType" name="signupUserType" required>
                            <option value="">Selecciona</option>
                            <option value="patient">Paciente</option>
                            <option value="secretary">Secretaria</option>
                            <option value="doctor">Médico</option>
                        </select>
                    </div>

                    <div class="form-group" id="specialtyGroup" style="display: none;">
                        <label for="specialty">Especialidad</label>
                        <select id="specialty" name="specialty">
                            <option value="">Selecciona especialidad</option>
                            <option value="cardiologia">Cardiología</option>
                            <option value="dermatologia">Dermatología</option>
                            <option value="pediatria">Pediatría</option>
                            <option value="oftalmologia">Oftalmología</option>
                            <option value="traumatologia">Traumatología</option>
                            <option value="neurologia">Neurología</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-primary">Registrarse</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
